{% extends "admin/base.html" %}
{% block content %}
<section class="admin-broadcast-page">
  <header class="admin-page-hero admin-broadcast-hero">
    <div class="admin-page-hero-head">
      <p class="admin-page-kicker">Audience Reach</p>
      <h1>Xabar yuborish</h1>
      <p id="broadcast-state" class="admin-page-subtitle">Faol foydalanuvchilar soni aniqlanmoqda...</p>
    </div>

    <div class="admin-broadcast-metrics">
      <div class="admin-strip-item">
        <span class="admin-strip-label">Faol foydalanuvchilar</span>
        <strong id="broadcast-count" class="admin-strip-value">0</strong>
      </div>
      <div class="admin-strip-item">
        <span class="admin-strip-label">Holat</span>
        <strong id="broadcast-state-badge" class="admin-pill admin-pill-warn">Tayyorlanmoqda</strong>
      </div>
    </div>
  </header>

  <section class="admin-form-shell">
    <form id="broadcast-form" class="admin-broadcast-form">
      <div class="admin-field">
        <label class="input-label" for="broadcast-message">Xabar matni</label>
        <textarea
          id="broadcast-message"
          class="input admin-textarea admin-broadcast-textarea"
          rows="6"
          maxlength="4096"
          required
          placeholder="Aksiya yoki e'lon matnini kiriting"
        ></textarea>
        <div class="admin-char-counter"><span id="broadcast-char-count">0</span>/4096</div>
      </div>

      <div class="admin-field admin-field-full">
        <label class="input-label" for="broadcast-image">Rasm (ixtiyoriy)</label>
        <div class="admin-upload-wrap">
          <input id="broadcast-image" class="admin-file-input" type="file" accept="image/*" />
          <label for="broadcast-image" class="admin-file-trigger">Rasm tanlash</label>
          <p id="broadcast-image-name" class="admin-file-name">Fayl tanlanmagan</p>
        </div>
        <div id="broadcast-image-preview-wrap" class="admin-image-preview-wrap hidden">
          <img id="broadcast-image-preview" class="admin-image-preview" alt="Broadcast rasm preview" />
        </div>
      </div>

      <button id="broadcast-submit" class="btn btn-primary" type="submit">Yuborish</button>
    </form>
  </section>

  <section id="broadcast-progress-card" class="admin-progress-card hidden">
    <div class="admin-progress-head">
      <h3>Yuborish jarayoni</h3>
      <p id="broadcast-progress" class="admin-progress-text">0/0</p>
    </div>
    <div class="admin-progress-track">
      <div id="broadcast-progress-fill" class="admin-progress-fill"></div>
    </div>
  </section>
</section>
{% endblock %}

{% block scripts %}
<script>
  (function () {
    const stateEl = document.getElementById("broadcast-state");
    const stateBadgeEl = document.getElementById("broadcast-state-badge");
    const countEl = document.getElementById("broadcast-count");
    const formEl = document.getElementById("broadcast-form");
    const submitBtn = document.getElementById("broadcast-submit");
    const messageEl = document.getElementById("broadcast-message");
    const charCountEl = document.getElementById("broadcast-char-count");
    const imageEl = document.getElementById("broadcast-image");
    const imageNameEl = document.getElementById("broadcast-image-name");
    const previewWrapEl = document.getElementById("broadcast-image-preview-wrap");
    const previewImgEl = document.getElementById("broadcast-image-preview");
    const progressCardEl = document.getElementById("broadcast-progress-card");
    const progressTextEl = document.getElementById("broadcast-progress");
    const progressFillEl = document.getElementById("broadcast-progress-fill");

    let previewObjectUrl = null;
    let pollTimer = null;

    function setStateBadge(mode, text) {
      if (!stateBadgeEl) return;
      stateBadgeEl.classList.remove("admin-pill-ok", "admin-pill-warn");
      if (mode === "ok") stateBadgeEl.classList.add("admin-pill-ok");
      else stateBadgeEl.classList.add("admin-pill-warn");
      stateBadgeEl.textContent = text;
    }

    function setState(text, mode) {
      if (stateEl) stateEl.textContent = text;
      setStateBadge(mode === "ok" ? "ok" : "warn", mode === "ok" ? "Faol" : "Diqqat");
    }

    function setSubmitState(isLoading) {
      submitBtn.disabled = isLoading;
      if (isLoading) submitBtn.classList.add("loading");
      else submitBtn.classList.remove("loading");
    }

    function updateCharCounter() {
      const len = (messageEl.value || "").length;
      charCountEl.textContent = String(len);
    }

    function clearPreview() {
      if (previewObjectUrl) {
        URL.revokeObjectURL(previewObjectUrl);
        previewObjectUrl = null;
      }
      previewImgEl.removeAttribute("src");
      previewWrapEl.classList.add("hidden");
      imageNameEl.textContent = "Fayl tanlanmagan";
    }

    function stopPolling() {
      if (pollTimer) {
        clearInterval(pollTimer);
        pollTimer = null;
      }
    }

    function setProgress(sent, total, failed) {
      const safeTotal = Math.max(Number(total || 0), 1);
      const safeSent = Number(sent || 0);
      const safeFailed = Number(failed || 0);
      const percent = Math.max(0, Math.min(100, Math.round((safeSent / safeTotal) * 100)));
      progressTextEl.textContent = safeSent + "/" + Number(total || 0) + " (xato: " + safeFailed + ")";
      progressFillEl.style.width = percent + "%";
    }

    async function fetchRecipientsCount() {
      const data = await window.apiFetch("/api/v1/admin/broadcast/recipients-count");
      return Number((data && data.total) || 0);
    }

    async function refreshRecipientsLabel() {
      try {
        const total = await fetchRecipientsCount();
        countEl.textContent = String(total);
        setState("Xabarni yuborishdan oldin matnni tekshiring.", "ok");
      } catch (error) {
        const message = (error && error.message) || "Foydalanuvchilar sonini olishda xatolik.";
        setState(message, "warn");
      }
    }

    function renderProgress(job) {
      const total = Number(job.total || 0);
      const sent = Number(job.sent || 0);
      const failed = Number(job.failed || 0);

      progressCardEl.classList.remove("hidden");
      setProgress(sent, total, failed);

      if (job.status === "completed") {
        stopPolling();
        setState(sent + " ta foydalanuvchiga yuborildi. Xato: " + failed, "ok");
        setSubmitState(false);
        if (typeof window.showToast === "function") {
          window.showToast("Broadcast yakunlandi", "success");
        }
      } else if (job.status === "failed") {
        stopPolling();
        const reason = job.error ? " (" + job.error + ")" : "";
        setState("Xatolik yuz berdi" + reason, "warn");
        setSubmitState(false);
      }
    }

    async function pollJob(jobId) {
      try {
        const job = await window.apiFetch("/api/v1/admin/broadcast/" + encodeURIComponent(jobId));
        renderProgress(job);
      } catch (error) {
        stopPolling();
        setState((error && error.message) || "Holatni tekshirishda xatolik.", "warn");
        setSubmitState(false);
      }
    }

    function startPolling(jobId) {
      stopPolling();
      pollJob(jobId);
      pollTimer = setInterval(function () {
        pollJob(jobId);
      }, 1500);
    }

    imageEl.addEventListener("change", function () {
      clearPreview();
      const file = imageEl.files && imageEl.files[0];
      if (!file) return;
      imageNameEl.textContent = file.name;
      previewObjectUrl = URL.createObjectURL(file);
      previewImgEl.src = previewObjectUrl;
      previewWrapEl.classList.remove("hidden");
    });

    messageEl.addEventListener("input", updateCharCounter);

    formEl.addEventListener("submit", async function (event) {
      event.preventDefault();

      const message = (messageEl.value || "").trim();
      if (!message) {
        setState("Xabar matni majburiy.", "warn");
        return;
      }

      let totalRecipients = 0;
      try {
        totalRecipients = await fetchRecipientsCount();
      } catch (error) {
        setState((error && error.message) || "Foydalanuvchilar sonini olib bo'lmadi.", "warn");
        return;
      }

      if (totalRecipients <= 0) {
        setState("Faol foydalanuvchi topilmadi.", "warn");
        return;
      }

      const confirmText = totalRecipients + " ta foydalanuvchiga xabar yuboriladi. Davom etasizmi?";
      if (!window.confirm(confirmText)) {
        return;
      }

      setSubmitState(true);
      setState("Yuborish navbatga qo'yildi...", "ok");
      progressCardEl.classList.remove("hidden");
      setProgress(0, totalRecipients, 0);

      const formData = new FormData();
      formData.append("message", message);
      const imageFile = imageEl.files && imageEl.files[0] ? imageEl.files[0] : null;
      if (imageFile) {
        formData.append("image", imageFile, imageFile.name);
      }

      try {
        const created = await window.apiFetch("/api/v1/admin/broadcast", {
          method: "POST",
          body: formData,
        });
        if (!created || !created.job_id) {
          throw new Error("Broadcast job yaratilmagan");
        }
        startPolling(created.job_id);
      } catch (error) {
        setSubmitState(false);
        setState((error && error.message) || "Broadcast yuborishda xatolik.", "warn");
      }
    });

    updateCharCounter();
    refreshRecipientsLabel();

    window.addEventListener("beforeunload", function () {
      clearPreview();
      stopPolling();
    });
  })();
</script>
{% endblock %}
