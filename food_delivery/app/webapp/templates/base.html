<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>{% block title %}FoodExpress{% endblock %}</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <script>
    (function () {
      const tg = window.Telegram && window.Telegram.WebApp;
      if (!tg) return;
      try {
        tg.ready();
      } catch (e) {}
    })();
  </script>
  <link rel="stylesheet" href="/static/css/tokens.css?v=20260409-2" />
  <link rel="stylesheet" href="/static/css/base.css?v=20260409-2" />
  <link rel="stylesheet" href="/static/css/components.css?v=20260409-2" />
  <link rel="stylesheet" href="/static/css/pages.css?v=20260409-2" />
  <script>
    window.BACKEND_URL = "{{ backend_url }}";
  </script>
</head>
<body class="app-body">
  <div id="app-error" class="state state-error hidden" role="alert"></div>

  <main class="main-pad">
    {% block content %}{% endblock %}
  </main>

  <nav class="navbar">
    <a href="/webapp/" class="nav-item {% if active == 'home' %}active{% endif %}" onclick="haptic()">
      <div class="nav-indicator"></div>
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
      <span class="nav-label" data-i18n="nav_home">Home</span>
    </a>
    <a href="/webapp/cart" class="nav-item {% if active == 'cart' %}active{% endif %}" onclick="haptic()">
      <div class="nav-indicator"></div>
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>
      <span class="nav-label" data-i18n="nav_cart">Cart</span>
      <span class="badge" id="cart-badge" style="display:none">0</span>
    </a>
    <a href="/webapp/orders" class="nav-item {% if active == 'orders' %}active{% endif %}" onclick="haptic()">
      <div class="nav-indicator"></div>
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
      <span class="nav-label" data-i18n="nav_orders">Orders</span>
    </a>
    <a href="/webapp/profile" class="nav-item {% if active == 'profile' %}active{% endif %}" onclick="haptic()">
      <div class="nav-indicator"></div>
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
      <span class="nav-label" data-i18n="nav_profile">Profile</span>
    </a>
  </nav>

  <script src="/static/js/animations.js?v=20260409-2"></script>
  <script src="/static/js/api.js?v=20260418-2"></script>
  <script src="/static/js/auth.js?v=20260418-1"></script>
  <script src="/static/js/i18n.js?v=20260416-2"></script>
  <script>
    (function () {
      const tg = window.Telegram && window.Telegram.WebApp;
      if (!tg) return;
      try {
        tg.ready();
        tg.expand();
      } catch (e) {}
      document.body.classList.add("tg-inited");
    })();

    (async function () {
      try {
        const tg = window.Telegram && window.Telegram.WebApp;
        const token = sessionStorage.getItem("access_token");
        if (!token && !(tg && tg.initData)) return;

        await (window.authReady || Promise.resolve());
        if (!window.apiFetch) return;
        const cart = await window.apiFetch("/api/v1/cart");
        const count = (cart.items || []).reduce(function (acc, item) {
          return acc + Number(item.quantity || 0);
        }, 0);
        updateCartBadge(count);
      } catch (e) {}
    })();
  </script>

  {% block scripts %}{% endblock %}
</body>
</html>
