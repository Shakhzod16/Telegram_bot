version: "3.9"

services:
  backend:
    build: .
    ports:
      - "8000:8000"
    env_file: .env
    volumes:
      - ./data:/app/data
    command: uvicorn backend.main:app --host 0.0.0.0 --port 8000

  bot:
    build: .
    env_file: .env
    depends_on:
      - backend
    command: python -m bot.main
